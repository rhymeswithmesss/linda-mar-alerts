name: Linda Mar Surf Alert

on:
  # Once a day: scans the 7-day forecast and emails a digest of upcoming
  # sweet-spot windows. 2 API calls/run (weather + tide) = well within the
  # Stormglass free tier of 10 calls/day. (PT = UTC-7 in summer / UTC-8 in winter)
  schedule:
    - cron: "0 13 * * *"    # 6:00am PT (UTC-7) — morning forecast digest

  # Also allows manual trigger for testing
  workflow_dispatch:

jobs:
  check-surf:
    name: Check Linda Mar Conditions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check surf conditions
        env:
          STORMGLASS_API_KEY: ${{ secrets.STORMGLASS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          TWILIO_TO: ${{ secrets.TWILIO_TO }}
        run: node check-surf.js
